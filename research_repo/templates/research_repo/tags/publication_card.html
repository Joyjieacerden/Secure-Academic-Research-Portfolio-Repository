<div style="background: white; border-radius: 12px; border-top: 4px solid var(--primary); padding: 1.75rem; box-shadow: 0 2px 8px rgba(0,0,0,0.06); transition: all 0.3s ease; cursor: pointer;" 
     onmouseover="this.style.transform='translateY(-4px)'; this.style.boxShadow='0 12px 24px rgba(0,0,0,0.1)';"
     onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='0 2px 8px rgba(0,0,0,0.06)';">
    
    <h3 style="margin: 0 0 0.75rem 0; font-size: 1.1rem; font-weight: 700; color: var(--text-dark);">
        {{ publication.title }}
    </h3>
    
    <div style="display: flex; align-items: center; gap: 1rem; color: var(--text-light); font-size: 0.9rem; margin-bottom: 1rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border);">
        <span><i class="bi bi-person-circle"></i> {{ publication.uploader.username }}</span>
        <span><i class="bi bi-calendar"></i> {{ pub_date }}</span>
        <span><i class="bi bi-people"></i> {{ author_count }} author{{ author_count|pluralize }}</span>
    </div>
    
    <p style="color: #555; line-height: 1.6; margin: 0 0 1.5rem 0; display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden; min-height: 6.4rem;">
        {{ publication.abstract }}
    </p>
    
    {% if show_actions %}
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem;">
        <a href="{% url 'publication_detail' publication.id %}" style="background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%); color: white; padding: 0.75rem 1rem; border-radius: 6px; text-decoration: none; font-weight: 600; text-align: center; font-size: 0.9rem; transition: all 0.2s ease;"
           onmouseover="this.style.transform='translateY(-2px)'; this.style.boxShadow='0 4px 12px rgba(139, 0, 0, 0.3)';"
           onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='none';">
            <i class="bi bi-eye"></i> View Details
        </a>
        <a href="{% url 'login' %}" style="background: transparent; color: var(--primary); border: 2px solid var(--primary); padding: 0.75rem 1rem; border-radius: 6px; text-decoration: none; font-weight: 600; text-align: center; font-size: 0.9rem; transition: all 0.2s ease;"
           onmouseover="this.style.backgroundColor='var(--primary)'; this.style.color='white';"
           onmouseout="this.style.backgroundColor='transparent'; this.style.color='var(--primary)';">
            <i class="bi bi-unlock"></i> Full Access
        </a>
    </div>
    {% endif %}
</div>
